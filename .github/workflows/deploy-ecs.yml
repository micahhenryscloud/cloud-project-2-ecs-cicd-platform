name: Deploy Docker App to ECS

on:
  push:
    branches:
      - main
    paths:
      - "docker-app/**"
      - ".github/workflows/deploy-ecs.yml"

env:
  AWS_REGION: eu-west-2
  ECR_REPOSITORY: micah-docker-app
  ECS_CLUSTER: micah-ecs-cluster
  ECS_SERVICE: micah-docker-task-service-9gzsa1x9

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        run: |
          IMAGE_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_URI ./docker-app
          docker push $IMAGE_URI

      - name: Force ECS service deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment